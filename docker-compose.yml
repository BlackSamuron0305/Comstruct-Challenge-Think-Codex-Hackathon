# =============================================================================
# Comstruct C-Materials Platform — Docker Compose
# =============================================================================
# Split files available for targeted deployments:
#   docker-compose.infra.yml    — postgres, redis, minio
#   docker-compose.backend.yml  — api-gateway, order, catalog, ai, notification
#   docker-compose.frontend.yml — web dashboard
# =============================================================================

services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AI Service ───────────────────────────────────────────────
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8005
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma3:4b
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./services/ai-service/src:/app/src
      - ./infra/keys:/run/secrets:ro
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Backend Services ─────────────────────────────────────────
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8002
      WATCHFILES_FORCE_POLLING: true
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/order-service/src:/app/src
      - ./infra/keys:/run/secrets:ro
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      retries: 3

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/catalog-service/src:/app/src
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      retries: 3

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8004
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./infra/keys:/run/secrets:ro
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      retries: 3

  # ── API Gateway ──────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      order-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./infra/keys:/run/secrets:ro
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      retries: 5

  # ── Frontend ─────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: dev
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/workspace/apps/web/src
      - ./apps/web/index.html:/workspace/apps/web/index.html
      - ./packages/ts-shared-types:/workspace/packages/ts-shared-types
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - comstruct-net

volumes:
  postgres_data:
  redis_data:

networks:
  comstruct-net:
    driver: bridge
