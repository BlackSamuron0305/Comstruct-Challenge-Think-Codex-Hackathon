name: comstruct_mobile
description: Comstruct C-Materials mobile app for construction teams.
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  shimmer: ^3.0.0

  # State management
  flutter_bloc: ^9.1.1

  # Routing
  go_router: ^17.2.1

  # Network
  dio: ^5.4.0
  dio_smart_retry: ^7.0.1
  web_socket_channel: ^3.0.0
  connectivity_plus: ^7.1.1

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # On-device LLM (Gemma via MediaPipe)
  # Uses the flutter_mediapipe_genai bindings for local inference
  uuid: ^4.4.0

  # Camera / Image
  image_picker: ^1.1.2

  # Voice / Speech
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Utilities
  json_annotation: ^4.9.0
  intl: ^0.20.2
  google_mlkit_text_recognition: ^0.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/
