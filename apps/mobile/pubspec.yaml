name: comstruct_mobile
description: comstruct C-Materials mobile app for Swiss construction foremen.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  flutter_bloc: ^8.1.4
  freezed_annotation: ^2.4.1
  go_router: ^14.0.2
  google_fonts: ^6.2.1
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.0
  web_socket_channel: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
