# Frontend services: web dashboard
services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: dev
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/workspace/apps/web/src
      - ./apps/web/index.html:/workspace/apps/web/index.html
      - ./packages/ts-shared-types:/workspace/packages/ts-shared-types
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - comstruct-net

networks:
  comstruct-net:
    external: true
    name: comstruct-challenge-think-codex-hackathon_comstruct-net
