# Backend services: API gateway, order, catalog, AI, notification
services:
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8005
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/ai-service/src:/app/src
      - ./infra/keys:/run/secrets:ro
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/order-service/src:/app/src
      - ./infra/keys:/run/secrets:ro
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      retries: 3

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8003
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/catalog-service/src:/app/src
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      retries: 3

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8004
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./infra/keys:/run/secrets:ro
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      retries: 3

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    env_file:
      - .env
    environment:
      SERVICE_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      order-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./infra/keys:/run/secrets:ro
    networks:
      - comstruct-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      retries: 5

networks:
  comstruct-net:
    external: true
    name: comstruct-challenge-think-codex-hackathon_comstruct-net
